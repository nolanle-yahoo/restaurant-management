<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Restaurant Management — Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--burgundy); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 380px; }
    .login-card { background: #fff; border-radius: 16px; padding: 36px; box-shadow: 0 16px 48px rgba(0,0,0,.28); }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .icon { font-size: 40px; }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--burgundy); margin-top: 8px; }
    .login-logo p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .login-footer { text-align: center; color: rgba(255,255,255,.55); font-size: 12px; margin-top: 18px; }
    #loginError { margin-bottom: 14px; }
    .login-btn { width: 100%; padding: 12px; font-size: 15px; }
    .mobile-hint { text-align:center; margin-top:12px; }
    .mobile-hint a { color: var(--gold); font-size:13px; font-weight:600; }
    .login-dark-btn { position:fixed; top:16px; right:16px; background:rgba(255,255,255,.15); border:none; border-radius:8px; font-size:18px; padding:6px 10px; cursor:pointer; transition:background .15s; }
    .login-dark-btn:hover { background:rgba(255,255,255,.25); }
    body.dark { background: #1e293b; }
    body.dark .login-card { background: #0f172a; }
    body.dark .login-card input { background: #1e293b; color: #e2e8f0; border-color: #334155; }
    body.dark .login-card label { color: #94a3b8; }
    body.dark .login-logo h1 { color: #C9A84C; }
    body.dark .login-logo p { color: #94a3b8; }
  </style>
</head>
<body>
<button class="login-dark-btn" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🍷</div>
      <h1>Restaurant Management</h1>
      <p>Multi-Location Operations Platform</p>
    </div>
    <div id="loginError" class="alert alert-danger hidden"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary login-btn">Sign In</button>
    </form>
    <div class="mobile-hint" style="margin-top:10px"><a href="#" onclick="showForgot();return false;">Forgot password?</a></div>

    <div id="forgotBox" class="hidden" style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
      <div id="forgotAlert" class="alert hidden"></div>
      <div class="form-group"><label>Account Email</label><input type="email" id="forgotEmail" placeholder="you@example.com"></div>
      <button class="btn btn-ghost" style="width:100%" onclick="submitForgot()">Send Reset Link</button>
    </div>

    <div class="mobile-hint" style="margin-top:14px"><a href="/pages/mobile.html">📱 Open Mobile Version</a></div>
    <div class="mobile-hint" style="margin-top:8px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
      <a href="/menu.html">🍽️ View Menu</a>
      <a href="/reserve.html">📅 Book a Table</a>
      <a href="/reserve-lookup.html">🔎 Find Reservation</a>
    </div>
  </div>
  <div class="login-footer">© 2025 Restaurant Management System</div>
</div>
<script src="/js/api.js"></script>
<script>
  function toggleDark() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('darkMode', isDark ? 'on' : 'off');
    document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
  }
  if (localStorage.getItem('darkMode') === 'on') {
    document.body.classList.add('dark');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('darkToggle');
      if (btn) btn.textContent = '☀️';
    });
  }

  const MOBILE_ROLES = ['waiter','frontdesk','chef','employee'];

  function isMobileDevice() {
    return window.innerWidth <= 768 || /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  }

  function getDestination(role, mobile) {
    if (mobile && MOBILE_ROLES.includes(role)) return '/pages/mobile.html';
    const map = { owner:'owner', manager:'manager', employee:'employee', frontdesk:'frontdesk', waiter:'waiter', chef:'chef', stockroom:'manager' };
    return '/pages/' + (map[role] || 'employee') + '.html';
  }

  if (localStorage.getItem('token') && localStorage.getItem('user')) {
    const u = JSON.parse(localStorage.getItem('user'));
    location.href = getDestination(u.role, isMobileDevice());
  }

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('loginError');
    errEl.classList.add('hidden');
    try {
      const data = await API.login(email, password);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      location.href = getDestination(data.user.role, isMobileDevice());
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    }
  });

  function showForgot() {
    document.getElementById('forgotBox').classList.toggle('hidden');
  }
  async function submitForgot() {
    const email = document.getElementById('forgotEmail').value.trim();
    const a = document.getElementById('forgotAlert');
    if (!email) { a.className='alert alert-danger'; a.textContent='Enter your account email.'; a.classList.remove('hidden'); return; }
    try {
      const r = await fetch('/api/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email }) });
      const d = await r.json();
      a.className='alert alert-success';
      a.textContent = d.message || 'If that email is registered, a reset link has been sent.';
      a.classList.remove('hidden');
    } catch {
      a.className='alert alert-danger'; a.textContent='Network error. Please try again.'; a.classList.remove('hidden');
    }
  }
</script>
</body>
</html>
