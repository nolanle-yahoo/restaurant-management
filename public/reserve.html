<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book a Table — Restaurant</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--cream); }
    .pub-header { background: var(--burgundy); color: #fff; padding: 22px 20px; text-align: center; }
    .pub-header .logo { font-size: 34px; }
    .pub-header h1 { font-size: 24px; font-weight: 800; margin-top: 6px; }
    .pub-nav { display: flex; gap: 10px; justify-content: center; padding: 14px; flex-wrap: wrap; background: #fff; border-bottom: 1px solid var(--border); }
    .res-card { max-width: 480px; margin: 28px auto; background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 28px; box-shadow: var(--shadow); }
    .res-card h2 { font-size: 18px; font-weight: 800; color: var(--burgundy); margin-bottom: 6px; }
    .res-card .sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
    .pub-foot { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
  </style>
</head>
<body>
  <div class="pub-header">
    <div class="logo">🍷</div>
    <h1>Book a Table</h1>
  </div>
  <div class="pub-nav">
    <a class="btn btn-ghost" href="/menu.html">🍽️ View Menu</a>
    <a class="btn btn-ghost" href="/">Staff Login</a>
  </div>

  <div class="res-card">
    <h2>Reservation Request</h2>
    <div class="sub">Submit a request and the restaurant will confirm shortly.</div>
    <div id="resAlert" class="alert hidden"></div>
    <div id="resForm">
      <div class="form-group"><label>Location *</label><select id="rLoc"></select></div>
      <div class="form-row">
        <div class="form-group"><label>Your Name *</label><input id="rName" placeholder="Full name"></div>
        <div class="form-group"><label>Phone</label><input id="rPhone" placeholder="(555) 000-0000"></div>
      </div>
      <div class="form-group"><label>Email</label><input id="rEmail" type="email" placeholder="you@example.com"></div>
      <div class="form-row">
        <div class="form-group"><label>Party Size *</label><input id="rParty" type="number" min="1" max="50" value="2"></div>
        <div class="form-group"><label>Date *</label><input id="rDate" type="date"></div>
      </div>
      <div class="form-group"><label>Time *</label><input id="rTime" type="time" value="19:00"></div>
      <div class="form-group"><label>Special Requests</label>
        <textarea id="rNotes" rows="2" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;resize:vertical" placeholder="High chair, window seat, allergies…"></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:12px;margin-top:6px" onclick="submitReservation()">Request Reservation</button>
    </div>
    <div id="resDeposit" class="hidden" style="text-align:center;padding:10px">
      <div style="font-size:40px">🔒</div>
      <div style="font-weight:800;color:var(--burgundy);font-size:17px;margin:6px 0">A deposit holds your table</div>
      <div style="color:var(--muted);font-size:14px;margin-bottom:12px" id="depMsg"></div>
      <div id="depMode" style="font-size:12px;color:var(--muted);margin-bottom:8px"></div>
      <div id="dep-card" style="display:none;padding:10px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:10px;text-align:left"></div>
      <div id="depAlert" class="alert hidden" style="margin-bottom:8px"></div>
      <button class="btn btn-primary" id="depPayBtn" style="width:100%" onclick="payDeposit()">Pay deposit</button>
      <div style="font-size:11.5px;color:var(--muted);margin-top:8px">Your reservation request is already submitted; this secures it.</div>
    </div>
    <div id="resDone" class="hidden" style="text-align:center;padding:20px">
      <div style="font-size:46px">✅</div>
      <div style="font-weight:800;color:var(--burgundy);font-size:17px;margin:8px 0">Request received!</div>
      <div style="color:var(--muted);font-size:14px" id="resDoneMsg"></div>
      <div id="resFb" style="border-top:1px dashed var(--border);margin:18px auto 0;padding-top:16px;max-width:360px;text-align:left"></div>
      <a class="btn btn-ghost" style="margin-top:16px" href="/menu.html">Browse the Menu</a>
    </div>
  </div>
  <div class="pub-foot">© 2026 Restaurant Management System</div>

<script src="/js/feedback.js"></script>
<script>
let lastResCode = null;  // confirmation code of the just-created reservation, for feedback
async function init() {
  document.getElementById('rDate').valueAsDate = new Date();
  try {
    const r = await fetch('/api/public/locations');
    const locs = await r.json();
    document.getElementById('rLoc').innerHTML = locs.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
    const qp = new URLSearchParams(location.search).get('location_id');
    if (qp && locs.some(l => String(l.id) === qp)) document.getElementById('rLoc').value = qp;
  } catch {}
}

function showResAlert(msg) {
  const el = document.getElementById('resAlert');
  el.className = 'alert alert-danger'; el.textContent = msg; el.classList.remove('hidden');
}

async function submitReservation() {
  const body = {
    location_id: document.getElementById('rLoc').value,
    guest_name: document.getElementById('rName').value.trim(),
    guest_phone: document.getElementById('rPhone').value.trim(),
    guest_email: document.getElementById('rEmail').value.trim(),
    party_size: parseInt(document.getElementById('rParty').value),
    reservation_date: document.getElementById('rDate').value,
    reservation_time: document.getElementById('rTime').value,
    notes: document.getElementById('rNotes').value.trim(),
  };
  if (!body.guest_name || !body.reservation_date || !body.reservation_time || !body.party_size) {
    return showResAlert('Please fill in your name, party size, date and time.');
  }
  try {
    const r = await fetch('/api/public/reservations', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const data = await r.json();
    if (!r.ok) return showResAlert(data.error || 'Could not submit reservation.');
    lastResCode = data.confirmation_code || null;
    document.getElementById('resForm').classList.add('hidden');
    document.getElementById('resAlert').classList.add('hidden');
    if (data.deposit_required) return startDeposit(data.confirmation_code, data.deposit_amount);
    showDone(data.message);
  } catch (e) { showResAlert('Network error. Please try again.'); }
}

function showDone(msg) {
  document.getElementById('resDeposit').classList.add('hidden');
  document.getElementById('resDoneMsg').textContent = msg || 'The restaurant will confirm shortly.';
  document.getElementById('resDone').classList.remove('hidden');
  if (window.FeedbackWidget && lastResCode) {
    FeedbackWidget.mount(document.getElementById('resFb'), { reservation_code: lastResCode, prompt: 'How was booking with us?' });
  }
}

let depCtx = null, depStripe = null, depElements = null;
const money = n => '$' + (Number(n)||0).toFixed(2);
function ensureStripe() {
  return new Promise((resolve, reject) => {
    if (window.Stripe) return resolve();
    const s = document.createElement('script'); s.src = 'https://js.stripe.com/v3/'; s.onload = resolve; s.onerror = () => reject(new Error('payment lib')); document.head.appendChild(s);
  });
}
async function startDeposit(code, amount) {
  document.getElementById('resDeposit').classList.remove('hidden');
  document.getElementById('depMsg').textContent = `A ${money(amount)} deposit is required to confirm this booking.`;
  document.getElementById('depPayBtn').textContent = `Pay ${money(amount)} deposit`;
  try {
    const r = await fetch('/api/public/reservations/deposit/intent', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ code }) });
    const d = await r.json(); if (!r.ok) throw new Error(d.error || 'Could not start payment.');
    depCtx = { code, ...d };
    if (d.simulated || !d.publishable_key) {
      document.getElementById('depMode').textContent = '🔒 Test mode — no real card is charged.';
    } else {
      document.getElementById('depMode').textContent = '🔒 Secured by Stripe.';
      await ensureStripe();
      depStripe = Stripe(d.publishable_key);
      depElements = depStripe.elements({ clientSecret: d.client_secret });
      const ce = document.getElementById('dep-card'); ce.style.display = 'block'; ce.innerHTML = '';
      depElements.create('payment').mount('#dep-card');
    }
  } catch (e) { document.getElementById('depAlert').className='alert alert-danger'; document.getElementById('depAlert').textContent = e.message; document.getElementById('depAlert').classList.remove('hidden'); }
}
async function payDeposit() {
  if (!depCtx) return;
  const btn = document.getElementById('depPayBtn'); btn.disabled = true; btn.textContent = 'Processing…';
  try {
    if (!depCtx.simulated && depCtx.client_secret && depStripe && depElements) {
      const { error, paymentIntent } = await depStripe.confirmPayment({ elements: depElements, redirect: 'if_required' });
      if (error || !paymentIntent || paymentIntent.status !== 'succeeded') { throw new Error(error ? error.message : 'Payment was not completed.'); }
    }
    const r = await fetch('/api/public/reservations/deposit/confirm', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ code: depCtx.code, intent_id: depCtx.intent_id }) });
    const d = await r.json(); if (!r.ok) throw new Error(d.error || 'Could not confirm payment.');
    showDone('Deposit received — your table is held. The restaurant will confirm shortly.');
  } catch (e) {
    const a = document.getElementById('depAlert'); a.className='alert alert-danger'; a.textContent = e.message; a.classList.remove('hidden');
    btn.disabled = false; btn.textContent = `Pay ${money(depCtx.amount)} deposit`;
  }
}
init();
</script>
</body>
</html>
