<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Online — Restaurant</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--cream); }
    .pub-header { background: var(--burgundy); color: #fff; padding: 22px 20px; text-align: center; }
    .pub-header .logo { font-size: 34px; }
    .pub-header h1 { font-size: 24px; font-weight: 800; margin-top: 6px; }
    .pub-nav { display: flex; gap: 10px; justify-content: center; padding: 14px; flex-wrap: wrap; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    .loc-select { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; }
    .order-wrap { max-width: 920px; margin: 0 auto; padding: 24px 18px 60px; display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
    @media(max-width:780px){ .order-wrap { grid-template-columns: 1fr; } }
    .menu-cat h2 { font-size: 18px; font-weight: 800; color: var(--burgundy); border-bottom: 2px solid var(--gold); padding-bottom: 8px; margin: 18px 0 10px; }
    .menu-row { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; }
    .mi-name { font-weight: 700; font-size: 14.5px; }
    .mi-desc { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
    .mi-price { font-weight: 800; color: var(--success); white-space: nowrap; font-size: 14px; }
    .cart { position: sticky; top: 76px; align-self: start; }
    .cart-line { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 6px 0; font-size: 13.5px; border-bottom: 1px solid var(--border); }
    .qty-btn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-weight: 700; }
    .field { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 8px; }
    .pub-foot { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
  </style>
</head>
<body>
  <div class="pub-header">
    <div class="logo">🍷</div>
    <h1>Order Online</h1>
    <p id="locLabel">Pickup &amp; delivery — pay when you collect</p>
  </div>
  <div class="pub-nav">
    <select id="locSelect" class="loc-select" onchange="loadMenu()"></select>
    <a class="btn btn-ghost" href="/menu.html">🍽️ Full Menu</a>
    <a class="btn btn-ghost" id="accountLink" href="/account.html">👤 My Account</a>
    <a class="btn btn-ghost" href="/">Staff Login</a>
  </div>

  <div class="order-wrap">
    <div>
      <div id="menuContent"><p style="color:var(--muted);padding:40px;text-align:center">Loading…</p></div>
    </div>

    <div class="cart">
      <div class="card">
        <div class="card-header"><div class="card-title">Your Order</div></div>
        <div id="cartLines"><p style="color:var(--muted);font-size:13px;padding:8px 0">Your cart is empty.</p></div>
        <div id="cartTotal" style="font-weight:800;text-align:right;margin:10px 0;font-size:15px"></div>

        <div id="checkout" style="display:none">
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <button id="btnPickup"   class="btn btn-sm btn-primary" style="flex:1" onclick="setType('pickup')">🥡 Pickup</button>
            <button id="btnDelivery" class="btn btn-sm btn-ghost"   style="flex:1" onclick="setType('delivery')">🚗 Delivery</button>
          </div>
          <input class="field" id="cName"  placeholder="Your name *">
          <input class="field" id="cPhone" placeholder="Phone *">
          <input class="field" id="cEmail" placeholder="Email (for confirmation)">
          <input class="field" id="cAddr"  placeholder="Delivery address *" style="display:none">
          <div id="whenBox" style="margin:2px 0 8px">
            <div style="font-size:12px;color:var(--muted);margin-bottom:4px">When</div>
            <div style="display:flex;gap:6px">
              <button type="button" id="whenAsap" class="btn btn-sm btn-primary" style="flex:1" onclick="setWhen('asap')">ASAP</button>
              <button type="button" id="whenLater" class="btn btn-sm btn-ghost" style="flex:1" onclick="setWhen('later')">Schedule</button>
            </div>
            <input class="field" id="schedTime" type="datetime-local" style="display:none;margin-top:6px">
          </div>
          <label id="curbWrap" style="display:flex;gap:8px;align-items:center;font-size:13px;margin:0 0 6px">
            <input type="checkbox" id="curbside" onchange="document.getElementById('vehicle').style.display=this.checked?'block':'none'"> 🚗 Curbside pickup
          </label>
          <input class="field" id="vehicle" placeholder="Vehicle (e.g., Red Honda Civic)" style="display:none">
          <textarea class="field" id="cNotes" rows="2" placeholder="Notes (allergies, instructions)"></textarea>
          <div id="payMethodBox" style="display:none;margin:4px 0 8px">
            <div style="font-size:12px;color:var(--muted);margin-bottom:5px">Payment method</div>
            <div id="savedCards"></div>
          </div>
          <label id="saveCardWrap" style="display:none;gap:8px;align-items:center;font-size:12.5px;margin:0 0 8px">
            <input type="checkbox" id="saveCard"> Save this card for next time
          </label>
          <div id="tipBox" style="margin:4px 0 8px">
            <div style="font-size:12px;color:var(--muted);margin-bottom:5px">Add a tip</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap" id="tipBtns">
              <button type="button" class="btn btn-sm btn-primary" onclick="setTip('0',this)">None</button>
              <button type="button" class="btn btn-sm btn-ghost" onclick="setTip('0.15',this)">15%</button>
              <button type="button" class="btn btn-sm btn-ghost" onclick="setTip('0.18',this)">18%</button>
              <button type="button" class="btn btn-sm btn-ghost" onclick="setTip('0.20',this)">20%</button>
              <button type="button" class="btn btn-sm btn-ghost" onclick="setTip('custom',this)">Custom</button>
            </div>
            <input class="field" id="tipCustom" type="number" min="0" step="0.50" placeholder="Custom tip ($)" style="display:none;margin-top:6px" oninput="renderCart()">
          </div>
          <div id="codesBox" style="display:flex;gap:6px;margin:4px 0 8px">
            <input class="field" id="promoCode" placeholder="Promo code" style="flex:1;margin:0;text-transform:uppercase">
            <input class="field" id="giftCode" placeholder="Gift card" style="flex:1;margin:0;text-transform:uppercase">
          </div>
          <div id="orderAlert" class="alert hidden" style="margin-bottom:8px"></div>
          <button id="checkoutBtn" class="btn btn-primary" style="width:100%" onclick="checkoutClick()">Continue to Payment</button>
          <div id="checkoutHint" style="font-size:11.5px;color:var(--muted);text-align:center;margin-top:6px">Pay securely online. Tax &amp; service added at checkout.</div>
        </div>

        <div id="payPanel" style="display:none;margin-top:6px">
          <div id="payBreakdown" style="font-size:13px;border-top:1px solid var(--border);padding-top:10px"></div>
          <div id="payMode" style="font-size:11.5px;margin:8px 0;color:var(--muted)"></div>
          <div id="card-element" style="display:none;padding:10px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px"></div>
          <div id="payAlert" class="alert hidden" style="margin-bottom:8px"></div>
          <button id="doPayBtn" class="btn btn-primary" style="width:100%" onclick="doPay()">Pay</button>
          <button class="btn btn-ghost" style="width:100%;margin-top:6px" onclick="cancelPay()">← Back</button>
        </div>
      </div>

      <div class="card" style="margin-top:14px">
        <div class="card-header"><div class="card-title">Track an Order</div></div>
        <input class="field" id="trackCode" placeholder="Tracking code (e.g. ORD-AB12CD)">
        <button class="btn btn-ghost" style="width:100%" onclick="trackOrder()">Check Status</button>
        <div id="trackResult" style="margin-top:10px;font-size:13.5px"></div>
      </div>
    </div>
  </div>
  <div class="pub-foot">© 2026 Restaurant Management System</div>

  <div class="modal-overlay" id="modModal">
    <div class="modal" style="width:420px;max-width:94vw">
      <div class="modal-title" id="modTitle">Customize</div>
      <div id="modAlert" class="alert hidden" style="margin-bottom:10px"></div>
      <div id="modBody" style="max-height:50vh;overflow:auto"></div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-primary" id="modAddBtn" style="flex:1" onclick="confirmMod()">Add</button>
        <button class="btn btn-ghost" onclick="closeModModal()">Cancel</button>
      </div>
    </div>
  </div>

<script src="/js/feedback.js"></script>
<script>
let cart = [], orderType = 'pickup', menuData = [], tableMode = false, tableId = null;
let modCtx = null; // item being customized in the modifier modal
let savedCards = [], selectedCardId = null; // null = pay with a new card
const signedIn = () => !!localStorage.getItem('ctoken');
async function api(path, opts = {}) {
  const ct = localStorage.getItem('ctoken');
  opts.headers = { ...(opts.headers || {}), ...(ct ? { Authorization: 'Bearer ' + ct } : {}) };
  const r = await fetch('/api/public' + path, opts);
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || 'Request failed');
  return r.json();
}
const money = n => '$' + (Number(n)||0).toFixed(2);
const DIET_LABELS = { vegetarian: '🥗 Veg', vegan: '🌱 Vegan', gluten_free: '🌾 GF' };
const dietBadges = d => (d || '').split(',').map(x => x.trim()).filter(Boolean)
  .map(x => `<span class="badge badge-success" style="font-size:10px">${DIET_LABELS[x] || x}</span>`).join(' ');

// Reflect signed-in state in the account link.
function refreshAccountLink() {
  try {
    const c = JSON.parse(localStorage.getItem('customer') || 'null');
    const el = document.getElementById('accountLink');
    if (c && localStorage.getItem('ctoken')) el.textContent = `👤 ${c.name.split(' ')[0]} · ${c.points ?? 0} pts`;
  } catch {}
}

async function init() {
  refreshAccountLink();
  try {
    const locs = await api('/locations');
    const sel = document.getElementById('locSelect');
    sel.innerHTML = locs.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
    const qp = new URLSearchParams(location.search);
    if (qp.get('location_id') && locs.some(l => String(l.id) === qp.get('location_id'))) sel.value = qp.get('location_id');
    // QR "table mode": ordering directly to a table (dine-in), no pickup/delivery.
    if (qp.get('table')) {
      tableMode = true; tableId = qp.get('table'); orderType = 'dine_in';
      sel.disabled = true;
      document.getElementById('btnPickup').parentElement.style.display = 'none';
      document.getElementById('cName').placeholder = 'Your name (optional)';
      document.getElementById('cPhone').style.display = 'none';
      document.getElementById('cEmail').style.display = 'none';
      document.getElementById('cAddr').style.display = 'none';
      document.querySelector('.pub-header h1').textContent = 'Order to Your Table';
      document.getElementById('locLabel').textContent = 'Your order goes straight to the kitchen';
      // Dine-in QR orders are settled at the table by a server (tip handled then).
      const tb = document.getElementById('tipBox'); if (tb) tb.style.display = 'none';
      ['whenBox','curbWrap','vehicle','codesBox'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
      const cb = document.getElementById('checkoutBtn'); if (cb) cb.textContent = 'Place Order';
      const ch = document.getElementById('checkoutHint'); if (ch) ch.textContent = 'A server will bring your bill.';
    }
    if (!tableMode && signedIn()) loadSavedCards();
    loadMenu();
    if (qp.get('code')) { document.getElementById('trackCode').value = qp.get('code'); trackOrder(); }
  } catch (e) {
    document.getElementById('menuContent').innerHTML = `<p style="color:var(--danger);padding:40px;text-align:center">${e.message}</p>`;
  }
}

async function loadMenu() {
  cart = []; renderCart();
  const locId = document.getElementById('locSelect').value;
  const el = document.getElementById('menuContent');
  el.innerHTML = '<p style="color:var(--muted);padding:40px;text-align:center">Loading…</p>';
  try {
    const { location, menu } = await api('/menu?location_id=' + locId);
    menuData = menu;
    document.getElementById('locLabel').textContent = 'Ordering from ' + location.name;
    if (!menu.length) { el.innerHTML = '<p style="color:var(--muted);padding:40px;text-align:center">No items available right now.</p>'; return; }
    el.innerHTML = menu.map(cat => `
      <div class="menu-cat">
        <h2>${cat.name}</h2>
        ${cat.items.map(i => `
          <div class="menu-row">
            ${i.image_url ? `<img src="${i.image_url}" alt="${i.name}" style="width:52px;height:52px;object-fit:cover;border-radius:8px" loading="lazy" onerror="this.style.display='none'">` : ''}
            <div style="flex:1">
              <div class="mi-name">${i.name} ${dietBadges(i.dietary)}</div>
              ${i.description ? `<div class="mi-desc">${i.description}</div>` : ''}
              ${i.allergens ? `<div style="font-size:11px;color:var(--danger);margin-top:2px">Contains: ${i.allergens}</div>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <span class="mi-price">${money(i.price)}${i.modifier_groups && i.modifier_groups.length ? '+' : ''}</span>
              <button class="btn btn-sm btn-primary" onclick="addToCart(${i.id})">${i.modifier_groups && i.modifier_groups.length ? 'Customize' : 'Add'}</button>
            </div>
          </div>`).join('')}
      </div>`).join('');
  } catch (e) {
    el.innerHTML = `<p style="color:var(--danger);padding:40px;text-align:center">${e.message}</p>`;
  }
}

function findItem(id) {
  for (const c of menuData) { const it = c.items.find(x => x.id === id); if (it) return it; }
  return null;
}
const lineKey = (id, optionIds) => id + '|' + [...optionIds].sort((a,b)=>a-b).join(',');
function addToCart(id) {
  const it = findItem(id); if (!it) return;
  if (it.modifier_groups && it.modifier_groups.length) return openModifierModal(it);
  addLine(it, []);
}
// Add a configured line (item + chosen option ids) to the cart.
function addLine(it, optionIds) {
  const groups = it.modifier_groups || [];
  let unit = it.price; const parts = [];
  groups.forEach(g => {
    const chosen = (g.options || []).filter(o => optionIds.includes(o.id));
    chosen.forEach(o => unit += o.price_delta);
    if (chosen.length) parts.push(chosen.map(o => o.name).join(', '));
  });
  unit = Math.round(unit * 100) / 100;
  const key = lineKey(it.id, optionIds);
  const existing = cart.find(l => l.key === key);
  if (existing) existing.qty++;
  else cart.push({ key, id: it.id, name: it.name, unitPrice: unit, qty: 1, optionIds: [...optionIds], modLabel: parts.join(' · ') });
  renderCart();
}
function changeQty(key, d) {
  const l = cart.find(x => x.key === key); if (!l) return;
  l.qty += d;
  if (l.qty <= 0) cart = cart.filter(x => x.key !== key);
  renderCart();
}
function renderCart() {
  const lines = document.getElementById('cartLines');
  const total = document.getElementById('cartTotal');
  document.getElementById('checkout').style.display = cart.length ? 'block' : 'none';
  if (!cart.length) { lines.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:8px 0">Your cart is empty.</p>'; total.textContent = ''; return; }
  lines.innerHTML = cart.map(l => `<div class="cart-line">
      <span style="flex:1">${l.name}${l.modLabel ? `<br><span style="font-size:11px;color:var(--muted)">${l.modLabel}</span>` : ''}</span>
      <button class="qty-btn" onclick="changeQty('${l.key}',-1)">−</button>
      <span style="min-width:18px;text-align:center">${l.qty}</span>
      <button class="qty-btn" onclick="changeQty('${l.key}',1)">+</button>
      <span style="min-width:54px;text-align:right;font-weight:700">${money(l.unitPrice*l.qty)}</span>
    </div>`).join('');
  const sub = currentSubtotal();
  const tip = tableMode ? 0 : tipAmount();
  total.innerHTML = `Subtotal: ${money(sub)}` +
    (tip > 0 ? `<br><span style="font-weight:600;color:var(--muted)">Tip: ${money(tip)}</span>` : '') +
    `<br><span style="font-size:11.5px;color:var(--muted);font-weight:600">+ tax &amp; service at checkout</span>`;
}

// ── Modifier selection modal ──
function openModifierModal(it) {
  modCtx = it;
  document.getElementById('modTitle').textContent = it.name;
  document.getElementById('modBody').innerHTML = (it.modifier_groups || []).map(g => {
    const type = g.max_select === 1 ? 'radio' : 'checkbox';
    const req = g.min_select >= 1 ? '<span style="color:var(--danger)">*</span>' : '<span style="color:var(--muted);font-weight:400">(optional)</span>';
    return `<div style="margin-bottom:12px" data-group="${g.id}" data-min="${g.min_select}" data-max="${g.max_select}">
      <div style="font-weight:700;font-size:13.5px;margin-bottom:4px">${g.name} ${req}</div>
      ${g.options.map(o => `<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px">
        <input type="${type}" name="g${g.id}" value="${o.id}" onchange="updateModPrice()">
        <span style="flex:1">${o.name}</span>${o.price_delta ? `<span style="color:var(--muted)">+${money(o.price_delta)}</span>` : ''}
      </label>`).join('')}
    </div>`;
  }).join('');
  document.getElementById('modAlert').classList.add('hidden');
  document.getElementById('modModal').classList.add('open');
  updateModPrice();
}
function closeModModal() { document.getElementById('modModal').classList.remove('open'); modCtx = null; }
function selectedModIds() {
  return [...document.querySelectorAll('#modBody input:checked')].map(i => Number(i.value));
}
function updateModPrice() {
  if (!modCtx) return;
  let unit = modCtx.price;
  const ids = selectedModIds();
  (modCtx.modifier_groups || []).forEach(g => g.options.forEach(o => { if (ids.includes(o.id)) unit += o.price_delta; }));
  document.getElementById('modAddBtn').textContent = `Add — ${money(Math.round(unit*100)/100)}`;
}
function confirmMod() {
  if (!modCtx) return;
  const ids = selectedModIds();
  // Enforce required groups + max.
  for (const g of (modCtx.modifier_groups || [])) {
    const n = g.options.filter(o => ids.includes(o.id)).length;
    if (n < g.min_select) { document.getElementById('modAlert').className = 'alert alert-danger'; document.getElementById('modAlert').textContent = `Please choose for "${g.name}".`; document.getElementById('modAlert').classList.remove('hidden'); return; }
  }
  addLine(modCtx, ids);
  closeModModal();
}

const round2 = n => Math.round((Number(n)||0) * 100) / 100;
let tipMode = '0';
function currentSubtotal() { return cart.reduce((s,l) => s + l.unitPrice*l.qty, 0); }
function tipAmount() {
  if (tipMode === 'custom') return round2(Math.max(0, parseFloat(document.getElementById('tipCustom').value) || 0));
  return round2(currentSubtotal() * parseFloat(tipMode || '0'));
}
function setTip(v, btn) {
  tipMode = v;
  document.querySelectorAll('#tipBtns button').forEach(b => b.className = 'btn btn-sm btn-ghost');
  btn.className = 'btn btn-sm btn-primary';
  document.getElementById('tipCustom').style.display = v === 'custom' ? 'block' : 'none';
  renderCart();
}

let whenMode = 'asap';
function setWhen(m) {
  whenMode = m;
  document.getElementById('whenAsap').className  = 'btn btn-sm ' + (m==='asap'?'btn-primary':'btn-ghost');
  document.getElementById('whenLater').className = 'btn btn-sm ' + (m==='later'?'btn-primary':'btn-ghost');
  const t = document.getElementById('schedTime');
  t.style.display = m==='later' ? 'block' : 'none';
  if (m==='later' && !t.value) { const d = new Date(Date.now()+30*60000); d.setSeconds(0,0); t.value = new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16); }
}
function setType(t) {
  orderType = t;
  document.getElementById('btnPickup').className   = 'btn btn-sm ' + (t==='pickup'?'btn-primary':'btn-ghost');
  document.getElementById('btnDelivery').className = 'btn btn-sm ' + (t==='delivery'?'btn-primary':'btn-ghost');
  document.getElementById('cAddr').style.display = t==='delivery' ? 'block' : 'none';
  // Curbside is a pickup-only option.
  document.getElementById('curbWrap').style.display = t==='pickup' ? 'flex' : 'none';
  if (t!=='pickup') { document.getElementById('curbside').checked = false; document.getElementById('vehicle').style.display = 'none'; }
}

function showOAlert(msg, type='danger') {
  const e = document.getElementById('orderAlert');
  e.className = 'alert alert-' + type; e.textContent = msg; e.classList.remove('hidden');
}

function gatherBody() {
  const items = cart.map(l => ({ id: l.id, quantity: l.qty, option_ids: l.optionIds }));
  const body = {
    location_id: Number(document.getElementById('locSelect').value),
    order_type: orderType,
    items,
    customer_name: document.getElementById('cName').value.trim(),
    customer_phone: document.getElementById('cPhone').value.trim(),
    customer_email: document.getElementById('cEmail').value.trim(),
    delivery_address: document.getElementById('cAddr').value.trim(),
    notes: document.getElementById('cNotes').value.trim(),
  };
  if (!tableMode) {
    const promo = document.getElementById('promoCode').value.trim(); if (promo) body.promo_code = promo;
    const gift = document.getElementById('giftCode').value.trim(); if (gift) body.gift_card_code = gift;
    if (whenMode === 'later' && document.getElementById('schedTime').value) body.scheduled_for = document.getElementById('schedTime').value;
    if (orderType === 'pickup' && document.getElementById('curbside').checked) {
      body.curbside = true;
      body.vehicle = document.getElementById('vehicle').value.trim();
    }
  }
  return body;
}
function validateBody(body) {
  if (!body.items.length) return 'Your cart is empty.';
  if (tableMode) return null;
  if (!body.customer_name || !body.customer_phone) return 'Please enter your name and phone.';
  if (orderType === 'delivery' && !body.delivery_address) return 'Please enter a delivery address.';
  return null;
}

// Main checkout button: table (QR) orders pay at the table; pickup/delivery prepay online.
function checkoutClick() {
  const body = gatherBody();
  const err = validateBody(body);
  if (err) return showOAlert(err);
  if (tableMode) return placeOrder(body);
  startPrepay(body);
}

function orderPlacedView({ tracking_code, paidLine, receipt_code }) {
  document.querySelector('.order-wrap').innerHTML = `
    <div class="card" style="grid-column:1/-1;max-width:520px;margin:0 auto;text-align:center;padding:30px">
      <div style="font-size:46px">✅</div>
      <h2 style="color:var(--burgundy);margin:10px 0">Order placed!</h2>
      <p style="font-size:15px">Your tracking code is</p>
      <p style="font-size:26px;font-weight:800;letter-spacing:1px;color:var(--burgundy);margin:6px 0">${tracking_code}</p>
      <p style="color:var(--muted)">${paidLine}</p>
      ${receipt_code ? `<p style="font-size:13px;margin-top:8px"><a href="/receipt.html?code=${receipt_code}">View receipt</a></p>` : ''}
      <p style="font-size:13px;color:var(--muted);margin-top:14px">Track your order anytime at<br><b>${location.origin}/order.html?code=${tracking_code}</b></p>
      <a class="btn btn-primary" style="margin-top:16px" href="/order.html?code=${tracking_code}">Track this order</a>
    </div>`;
}

// Table (QR) flow — unchanged: order fires now, server settles the bill at the table.
async function placeOrder(body) {
  body = body || gatherBody();
  if (tableMode) body.table_id = Number(tableId);
  try {
    const r = await api('/order', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    orderPlacedView({ tracking_code: r.tracking_code, paidLine: `Estimated total (a server will bring your bill): <b>${money(r.estimated_total)}</b>` });
  } catch (e) { showOAlert(e.message); }
}

// ── Saved cards (signed-in customers) ──────────────────────
async function loadSavedCards() {
  try { savedCards = await api('/account/cards'); } catch { savedCards = []; }
  renderCardChooser();
}
function renderCardChooser() {
  const box = document.getElementById('payMethodBox');
  const list = document.getElementById('savedCards');
  if (!signedIn() || !savedCards.length) { box.style.display = 'none'; selectedCardId = null; updateSaveWrap(); return; }
  if (selectedCardId === null) selectedCardId = savedCards[0].id;
  box.style.display = 'block';
  const opt = (id, label, checked) =>
    `<label style="display:flex;gap:8px;align-items:center;font-size:13px;padding:5px 0">
       <input type="radio" name="pm" value="${id}" ${checked?'checked':''} onchange="setCard(${id})"> ${label}
     </label>`;
  list.innerHTML =
    savedCards.map(c => opt(c.id, `${(c.brand||'card').toUpperCase()} ••${c.last4} <span style="color:var(--muted)">exp ${String(c.exp_month).padStart(2,'0')}/${String(c.exp_year).slice(-2)}</span>`, selectedCardId === c.id)).join('') +
    opt('new', '➕ Use a new card', selectedCardId === 'new');
  updateSaveWrap();
}
function setCard(v) { selectedCardId = (v === 'new') ? 'new' : Number(v); updateSaveWrap(); }
function updateSaveWrap() {
  // Offer "save card" only to signed-in customers paying with a new card.
  const newCard = (selectedCardId === 'new' || !savedCards.length);
  document.getElementById('saveCardWrap').style.display = (signedIn() && newCard) ? 'flex' : 'none';
}

// ── Prepay flow (pickup/delivery): intent → card → confirm ──
let payCtx = null, stripeObj = null, payElements = null;
async function startPrepay(body) {
  body.tip = tipAmount();
  const usingSaved = signedIn() && savedCards.length && selectedCardId && selectedCardId !== 'new';
  if (usingSaved) body.card_id = selectedCardId;
  if (signedIn() && !usingSaved && document.getElementById('saveCard').checked) body.save_card = true;
  document.getElementById('checkoutBtn').disabled = true;
  try {
    const r = await api('/order/intent', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    payCtx = { ...r, body, usingSaved };
    const b = r.breakdown;
    const due = b.amount_due != null ? b.amount_due : b.total;
    const line = (lbl, val, opt) => opt && !val ? '' : `<div style="display:flex;justify-content:space-between"><span>${lbl}</span><span>${money(val)}</span></div>`;
    document.getElementById('payBreakdown').innerHTML =
      line('Subtotal', b.subtotal) +
      (b.promo_discount ? `<div style="display:flex;justify-content:space-between;color:var(--success)"><span>Promo discount</span><span>−${money(b.promo_discount)}</span></div>` : '') +
      line('Service', b.service, true) + line('Tax', b.tax) + line('Tip', b.tip, true) +
      `<div style="display:flex;justify-content:space-between;font-weight:700;border-top:1px solid var(--border);margin-top:4px;padding-top:4px"><span>Total</span><span>${money(b.total)}</span></div>` +
      (b.gift_applied ? `<div style="display:flex;justify-content:space-between;color:var(--success)"><span>Gift card</span><span>−${money(b.gift_applied)}</span></div>
       <div style="display:flex;justify-content:space-between;font-weight:800"><span>Amount due</span><span>${money(due)}</span></div>` : '');
    document.getElementById('doPayBtn').textContent = r.fully_covered ? 'Place order (paid by gift card)' : `Pay ${money(due)}`;
    document.getElementById('checkout').style.display = 'none';
    document.getElementById('payPanel').style.display = 'block';
    document.getElementById('payAlert').classList.add('hidden');
    const ce = document.getElementById('card-element');
    ce.style.display = 'none'; ce.innerHTML = '';

    if (r.fully_covered) {
      document.getElementById('payMode').textContent = '🎁 Covered by your gift card — no card needed.';
    } else if (usingSaved) {
      const c = savedCards.find(x => x.id === selectedCardId);
      document.getElementById('payMode').textContent = `Paying with ${(c.brand||'card').toUpperCase()} ••${c.last4}.`;
    } else if (r.simulated || !r.publishable_key) {
      document.getElementById('payMode').textContent = '🔒 Test mode — no real card is charged.';
    } else {
      document.getElementById('payMode').textContent = '🔒 Card, Apple Pay & Google Pay — secured by Stripe.';
      await ensureStripe();
      stripeObj = Stripe(r.publishable_key);
      // The Payment Element automatically offers Apple Pay / Google Pay when available.
      payElements = stripeObj.elements({ clientSecret: r.client_secret });
      payElements.create('payment').mount('#card-element');
      ce.style.display = 'block';
    }
  } catch (e) { cancelPay(); showOAlert(e.message); }
  finally { document.getElementById('checkoutBtn').disabled = false; }
}

function ensureStripe() {
  return new Promise((resolve, reject) => {
    if (window.Stripe) return resolve();
    const s = document.createElement('script');
    s.src = 'https://js.stripe.com/v3/'; s.onload = resolve; s.onerror = () => reject(new Error('Could not load payment library.'));
    document.head.appendChild(s);
  });
}

function showPayAlert(msg) { const e = document.getElementById('payAlert'); e.className = 'alert alert-danger'; e.textContent = msg; e.classList.remove('hidden'); }
function cancelPay() { document.getElementById('payPanel').style.display = 'none'; document.getElementById('checkout').style.display = 'block'; payCtx = null; }

async function doPay() {
  if (!payCtx) return;
  const btn = document.getElementById('doPayBtn');
  const due = payCtx.breakdown.amount_due != null ? payCtx.breakdown.amount_due : payCtx.breakdown.total;
  const resetBtn = () => { btn.disabled = false; btn.textContent = payCtx.fully_covered ? 'Place order (paid by gift card)' : `Pay ${money(due)}`; };
  btn.disabled = true; btn.textContent = 'Processing…';
  try {
    // New card via real Stripe: confirm the Payment Element (card/Apple Pay/Google Pay) first.
    if (!payCtx.usingSaved && !payCtx.simulated && payCtx.client_secret && stripeObj && payElements) {
      const { error, paymentIntent } = await stripeObj.confirmPayment({ elements: payElements, redirect: 'if_required' });
      if (error) { showPayAlert(error.message); return resetBtn(); }
      if (!paymentIntent || paymentIntent.status !== 'succeeded') { showPayAlert('Payment was not completed.'); return resetBtn(); }
    }
    const r = await api('/order/confirm', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ...payCtx.body, intent_id: payCtx.intent_id }) });
    const paid = r.breakdown.amount_due != null ? r.breakdown.amount_due : r.breakdown.total;
    const extra = (r.breakdown.gift_applied ? ` · gift card ${money(r.breakdown.gift_applied)}` : '') + (r.breakdown.promo_discount ? ` · promo −${money(r.breakdown.promo_discount)}` : '');
    orderPlacedView({ tracking_code: r.tracking_code, receipt_code: r.receipt_code, paidLine: `Paid online: <b>${money(paid)}</b>${extra}` });
  } catch (e) { showPayAlert(e.message); resetBtn(); }
}

let trackTimer = null, leafletMap = null;
function stopTrackPolling() { if (trackTimer) clearInterval(trackTimer); trackTimer = null; }
function ensureLeaflet() {
  return new Promise((resolve, reject) => {
    if (window.L) return resolve();
    const css = document.createElement('link'); css.rel = 'stylesheet'; css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'; document.head.appendChild(css);
    const s = document.createElement('script'); s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'; s.onload = resolve; s.onerror = () => reject(new Error('map')); document.head.appendChild(s);
  });
}
async function renderDriverMap(lat, lng) {
  try {
    await ensureLeaflet();
    const elMap = document.getElementById('trackMap'); if (!elMap) return;
    leafletMap = L.map(elMap).setView([lat, lng], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(leafletMap);
    L.marker([lat, lng]).addTo(leafletMap).bindPopup('Your driver').openPopup();
  } catch { /* map is best-effort; the status timeline still works */ }
}

async function trackOrder() {
  const code = document.getElementById('trackCode').value.trim();
  const out = document.getElementById('trackResult');
  if (!code) { stopTrackPolling(); out.innerHTML = ''; return; }
  leafletMap = null;
  try {
    const o = await api('/order?code=' + encodeURIComponent(code));
    const steps = ['pending','preparing','ready','served'];
    const labels = { pending:'Received', preparing:'Preparing', ready:'Ready', served:'Completed' };
    const idx = steps.indexOf(o.status);
    let html = `
      <div style="font-weight:700">${o.order_type === 'delivery' ? '🚗 Delivery' : '🥡 Pickup'} — ${o.location_name}</div>
      ${o.scheduled_for ? `<div style="font-size:12.5px;color:var(--burgundy);font-weight:700">⏰ Scheduled for ${new Date(o.scheduled_for).toLocaleString([], {weekday:'short', hour:'numeric', minute:'2-digit'})}</div>` : ''}
      <div style="margin:8px 0">${steps.map((s,n) => `<span style="color:${n<=idx?'var(--success)':'var(--muted)'};font-weight:${n===idx?'800':'400'}">${labels[s]}${n<steps.length-1?' → ':''}</span>`).join('')}</div>`;

    if (o.curbside && o.status !== 'served') {
      html += o.arrived_at
        ? `<div style="font-size:13px;color:var(--success);font-weight:700;margin:4px 0">🚗 We know you're here — bringing it out!</div>`
        : `<div style="margin:4px 0"><button class="btn btn-gold btn-sm" onclick="arrived('${o.tracking_code}')">🚗 I'm here (curbside)</button>${o.vehicle?` <span style="font-size:12px;color:var(--muted)">${o.vehicle}</span>`:''}</div>`;
    }

    const D = o.delivery;
    if (D) {
      const ds = ['assigned','picked_up','delivered'];
      const dl = { assigned:'Driver assigned', picked_up:'On the way', delivered:'Delivered' };
      const di = ds.indexOf(D.status);
      html += `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
        <div style="font-weight:700;font-size:13px">Delivery${D.driver_name ? ` · 🧑 ${D.driver_name}` : ''}${(D.eta_minutes!=null && D.status!=='delivered') ? ` · ETA ${D.eta_minutes} min` : ''}</div>` +
        (D.status === 'failed'
          ? `<div style="color:var(--danger);margin-top:4px">We couldn't complete this delivery — please contact the restaurant.</div>`
          : D.status === 'pending'
            ? `<div style="color:var(--muted);margin-top:4px">Finding a driver…</div>`
            : `<div style="margin:6px 0">${ds.map((s,n)=>`<span style="color:${n<=di?'var(--success)':'var(--muted)'};font-weight:${n===di?'800':'400'}">${dl[s]}${n<ds.length-1?' → ':''}</span>`).join('')}</div>`) +
        ((D.driver_lat!=null && D.status!=='delivered' && D.status!=='failed') ? `<div id="trackMap" style="height:200px;border-radius:10px;margin-top:8px"></div>` : '') +
        `</div>`;
    }
    html += `<div style="font-size:12.5px;color:var(--muted);margin-top:8px">${(o.items||[]).map(i=>`${i.item_name} ×${i.quantity}${i.modifiers?` <span style="color:var(--muted)">(${i.modifiers})</span>`:''}`).join('<br>')}</div>`;
    out.innerHTML = html;

    if (D && D.driver_lat != null && D.status !== 'delivered' && D.status !== 'failed') renderDriverMap(D.driver_lat, D.driver_lng);
    // Keep refreshing while a delivery is in motion.
    if (D && (D.status === 'assigned' || D.status === 'picked_up')) { stopTrackPolling(); trackTimer = setInterval(trackOrder, 15000); }
    else stopTrackPolling();
  } catch (e) { stopTrackPolling(); out.innerHTML = `<span style="color:var(--danger)">${e.message}</span>`; }
}
async function arrived(code) {
  try { await api('/order/arrived', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ code }) }); trackOrder(); }
  catch (e) { alert(e.message); }
}
init();
</script>
