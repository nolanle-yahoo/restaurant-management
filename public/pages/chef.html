<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chef Station</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .queue-wrap { display: grid; grid-template-columns: 1fr 280px; gap: 24px; }
    @media(max-width:900px){ .queue-wrap { grid-template-columns:1fr; } }
    .elapsed-urgent { color: var(--danger) !important; }
    .order-card { animation: slideIn .3s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    .empty-queue { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-queue .eq-icon { font-size:48px; margin-bottom:12px; }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🍷</div>
      <div class="logo-name">Restaurant Mgmt</div>
      <div class="logo-sub">Chef Station</div>
    </div>
    <div class="sidebar-user">
      <div class="user-name" id="sb-name"></div>
      <div class="user-role" id="sb-role"></div>
      <div class="user-loc" id="sb-location"></div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="#"><span class="nav-icon">🍳</span>Order Queue</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn">Sign Out</button></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <div class="topbar">
      <button class="hamburger-btn" id="hamburgerBtn">☰</button>
      <div class="topbar-title">Kitchen Order Queue</div>
      <div class="topbar-right">
        <span class="text-muted text-sm" id="queueCount">Loading...</span>
        <span class="text-muted text-sm" id="topbarTime"></span>
        <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
        <div style="width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite" title="Live"></div>
      </div>
    </div>

    <div class="page-body">
      <div id="lowStockBanner"></div>
      <div class="queue-wrap">
        <div>
          <div class="stat-grid" style="margin-bottom:16px" id="queueStats"></div>
          <div id="orderQueue"></div>
        </div>
        <div>
          <div class="card" style="margin-bottom:16px">
            <div class="card-header"><div class="card-title">Inventory Quick View</div></div>
            <div id="invQuick"></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Menu Availability</div></div>
            <div style="font-size:11.5px;color:var(--muted);margin-bottom:8px">Tap to mark an item out of stock ("86") or back on.</div>
            <div id="menuAvail"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
const user = requireAuth(['chef','manager']);
if (user) populateSidebar(user);
liveClock('topbarTime');

let orders = [];

async function loadQueue() {
  orders = await API.orders(user.location_id);
  const active = orders.filter(o => ['pending','preparing'].includes(o.status));
  const ready  = orders.filter(o => o.status === 'ready');

  document.getElementById('queueStats').innerHTML = `
    <div class="stat-card"><div class="stat-icon warning">🔥</div><div class="stat-info"><div class="stat-value">${active.filter(o=>o.status==='pending').length}</div><div class="stat-label">Pending</div></div></div>
    <div class="stat-card"><div class="stat-icon burgundy">👨‍🍳</div><div class="stat-info"><div class="stat-value">${active.filter(o=>o.status==='preparing').length}</div><div class="stat-label">Preparing</div></div></div>
    <div class="stat-card"><div class="stat-icon success">✅</div><div class="stat-info"><div class="stat-value">${ready.length}</div><div class="stat-label">Ready</div></div></div>
  `;

  document.getElementById('queueCount').textContent = `${active.length} active order${active.length!==1?'s':''} · `;

  const sorted = active.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  const readySorted = ready.sort((a,b) => new Date(b.updated_at||b.created_at) - new Date(a.updated_at||a.created_at));

  if (!sorted.length && !readySorted.length) {
    document.getElementById('orderQueue').innerHTML = `
      <div class="empty-queue">
        <div class="eq-icon">🍽️</div>
        <div style="font-size:18px;font-weight:700;color:var(--charcoal)">All caught up!</div>
        <div style="margin-top:6px">No active orders in the queue</div>
      </div>`;
    return;
  }

  const activeHtml = sorted.map(o => {
    const mins = Math.floor((Date.now() - new Date(o.created_at + 'Z')) / 60000);
    const urgent = mins > 15;
    return `
      <div class="order-card status-${o.status}" style="margin-bottom:14px">
        <div class="order-header">
          <div>
            <div class="order-table">${orderLabel(o)}</div>
            <div class="order-time ${urgent?'elapsed-urgent':''}">⏱ ${mins}m waiting${urgent?' — URGENT':''}</div>
          </div>
          ${statusBadge(o.status)}
        </div>
        <div class="order-items" style="margin:10px 0">
          ${(o.items||[]).map(i=>`<div class="order-item-row">• ${i.item_name} <span style="color:var(--muted)">×${i.quantity}</span></div>`).join('')}
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Waiter: ${o.waiter_name || '—'}</div>
        <div class="order-actions">
          ${o.status==='pending'   ? `<button class="btn btn-primary btn-sm" onclick="advance(${o.id},'preparing')">Start Preparing</button>` : ''}
          ${o.status==='preparing' ? `<button class="btn btn-success btn-sm" onclick="advance(${o.id},'ready')">Mark Ready</button>` : ''}
        </div>
      </div>`;
  }).join('');

  const readyHtml = readySorted.length ? `
    <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px">
      ✅ Ready for pickup (${readySorted.length})
    </div>
    ${readySorted.map(o => `
      <div class="order-card status-ready" style="margin-bottom:10px;opacity:.75">
        <div class="order-header">
          <div class="order-table">${orderLabel(o)}</div>
          ${statusBadge(o.status)}
        </div>
        <div class="order-items" style="margin:8px 0">
          ${(o.items||[]).map(i=>`<div class="order-item-row">• ${i.item_name} ×${i.quantity}</div>`).join('')}
        </div>
        <div style="font-size:12px;color:var(--muted)">Waiter: ${o.waiter_name || '—'}</div>
      </div>`).join('')}` : '';

  document.getElementById('orderQueue').innerHTML = activeHtml + readyHtml;
}

function orderLabel(o) {
  if (o.table_id) return 'Table ' + o.table_number;
  const t = o.order_type === 'delivery' ? '🚗 Delivery' : '🥡 Pickup';
  return `${t} — ${o.customer_name || 'Online'}`;
}

async function advance(id, status) {
  await API.updateOrder(id, status);
  loadQueue();
}

function renderLowStockBanner(lowItems) {
  const el = document.getElementById('lowStockBanner');
  if (!el) return;
  if (!lowItems.length) { el.innerHTML = ''; return; }
  const critical = lowItems.filter(i => i.quantity <= i.min_quantity * 0.5);
  el.innerHTML = `
    <div style="background:rgba(196,118,42,.10);border:1px solid var(--warning);border-left:4px solid var(--warning);border-radius:10px;padding:12px 16px;margin-bottom:16px">
      <div style="font-weight:800;color:var(--warning);font-size:13.5px;margin-bottom:6px">⚠️ ${lowItems.length} ingredient${lowItems.length>1?'s':''} low on stock${critical.length?` (${critical.length} critical)`:''}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${lowItems.slice(0,12).map(i => {
          const isCrit = i.quantity <= i.min_quantity * 0.5;
          return `<span class="badge ${isCrit?'badge-danger':'badge-warning'}" style="font-size:11px">${i.item_name}: ${i.quantity}${i.unit?' '+i.unit:''} / min ${i.min_quantity}</span>`;
        }).join('')}
      </div>
    </div>`;
}

async function loadMenuAvail() {
  const items = await API.menuItems(user.location_id);
  document.getElementById('menuAvail').innerHTML = items.map(i => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;${i.is_available?'':'color:var(--muted);text-decoration:line-through'}">${i.name}</span>
      <button class="btn btn-sm ${i.is_available?'btn-success':'btn-ghost'}" onclick="toggleAvail(${i.id},${i.is_available})">${i.is_available?'Available':'86 — Out'}</button>
    </div>`).join('') || '<div style="color:var(--muted);padding:12px;text-align:center">No menu items</div>';
}

async function toggleAvail(id, cur) {
  try { await API.menuItemUpdate(id, { is_available: cur ? 0 : 1 }); loadMenuAvail(); }
  catch(e) { alert(e.message); }
}

async function loadInventory() {
  const items = await API.inventory(user.location_id);
  renderLowStockBanner(items.filter(i => i.quantity < i.min_quantity));
  const keyItems = items.filter(i => ['Meat','Seafood','Dairy'].includes(i.category));
  document.getElementById('invQuick').innerHTML = keyItems.map(i => {
    const pct = Math.min(100, Math.round(i.quantity / (i.min_quantity * 2) * 100));
    const cls = i.quantity < i.min_quantity ? (i.quantity < i.min_quantity * 0.5 ? 'critical' : 'low') : 'ok';
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:13px;font-weight:600">${i.item_name}</div>
          <div style="font-size:11.5px;color:var(--muted)">${i.quantity} ${i.unit}</div>
        </div>
        <div style="width:70px">
          <div class="inv-bar-wrap" style="width:70px"><div class="inv-bar ${cls}" style="width:${pct}%"></div></div>
        </div>
      </div>
    `;
  }).join('') || '<div style="color:var(--muted);padding:12px;text-align:center">No data</div>';
}

loadQueue();
loadInventory();
loadMenuAvail();
setInterval(loadQueue, 5000);
setInterval(loadInventory, 30000);
setInterval(loadMenuAvail, 30000);

connectWebSocket(user?.location_id, {
  order_update: () => loadQueue(),
});
</script>
</body>
</html>
