<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waiter Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .my-table-card { background: var(--card); border-radius: var(--radius); border: 2px solid var(--gold); padding: 16px; cursor: pointer; transition: all .15s; }
    .my-table-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .order-item-input { display: grid; grid-template-columns: 1fr 80px 90px 32px; gap: 6px; margin-bottom: 6px; align-items: center; }
    .order-item-input input { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; }
    .remove-item { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; line-height: 1; }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🍷</div>
      <div class="logo-name">Restaurant Mgmt</div>
      <div class="logo-sub">Waiter Station</div>
    </div>
    <div class="sidebar-user">
      <div class="user-name" id="sb-name"></div>
      <div class="user-role" id="sb-role"></div>
      <div class="user-loc" id="sb-location"></div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="#" onclick="switchView('tables')"><span class="nav-icon">🪑</span>Tables</a>
      <a class="nav-item" href="#" onclick="switchView('orders')"><span class="nav-icon">🍽️</span>My Orders</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn">Sign Out</button></div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Tables</div>
      <div class="topbar-right">
        <span class="text-muted text-sm" id="topbarTime"></span>
        <button class="btn btn-ghost btn-sm" onclick="loadAll()">↻ Refresh</button>
      </div>
    </div>

    <div class="page-body">
      <div id="alertBox" class="alert hidden" style="margin-bottom:16px"></div>

      <div id="view-tables">
        <div class="card" style="margin-bottom:16px">
          <div class="card-header"><div class="card-title">Floor Map — All Tables</div></div>
          <div class="floor-grid" id="floorGrid"></div>
        </div>
      </div>

      <div id="view-orders" class="hidden">
        <div class="order-queue" id="myOrders"></div>
      </div>
    </div>
  </div>
</div>

<!-- Take Order Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="width:520px">
    <div class="modal-title" id="orderModalTitle">Take Order — Table ?</div>
    <div id="orderAlert" class="alert hidden"></div>
    <div id="orderItems"></div>
    <button class="btn btn-ghost btn-sm" onclick="addItem()" style="margin-top:6px">+ Add Item</button>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn btn-primary" onclick="submitOrder()">Place Order</button>
      <button class="btn btn-ghost" onclick="hideModal('orderModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
const user = requireAuth(['waiter','manager']);
if (user) populateSidebar(user);
liveClock('topbarTime');
onModalOverlayClick('orderModal');

let tables = [], selectedTableId = null, orderItemCount = 0;
const STATUS_BG = { empty:'#fff', waiting_order:'rgba(201,168,76,.15)', ordered:'rgba(196,118,42,.15)', waiting_food:'rgba(230,126,34,.15)', ready_clean:'rgba(74,124,89,.15)', cleaning:'#F5F5F5' };
const STATUS_BOR = { empty:'#D1C9BB', waiting_order:'#C9A84C', ordered:'#C4762A', waiting_food:'#E67E22', ready_clean:'#4A7C59', cleaning:'#999' };

function switchView(v) {
  document.getElementById('view-tables').classList.toggle('hidden', v !== 'tables');
  document.getElementById('view-orders').classList.toggle('hidden', v !== 'orders');
  document.querySelectorAll('.nav-item').forEach((n,i) => n.classList.toggle('active', ['tables','orders'][i] === v));
  document.getElementById('pageTitle').textContent = { tables:'Tables', orders:'My Orders' }[v];
  if (v === 'orders') loadMyOrders();
}

async function loadAll() {
  tables = await API.tables(user.location_id);
  document.getElementById('floorGrid').innerHTML = tables.map(t => `
    <div class="table-card" style="background:${STATUS_BG[t.status]};border-color:${STATUS_BOR[t.status]};border-width:2.5px;" onclick="tableClick(${t.id})">
      <div class="table-num">T${t.table_number}</div>
      <div class="table-cap">Seats ${t.capacity}</div>
      <div class="table-stat" style="color:${STATUS_BOR[t.status]};font-size:11.5px;font-weight:600">${tableStatusLabel(t.status)}</div>
      ${t.status === 'waiting_order' ? '<div style="margin-top:6px"><span class="badge badge-gold" style="font-size:10px">Take Order</span></div>' : ''}
    </div>
  `).join('');
}

function tableClick(id) {
  const t = tables.find(x => x.id === id);
  if (t.status === 'empty') return showAlert('alertBox', 'This table is empty — seat guests first via Front Desk', 'warning');
  if (t.status !== 'waiting_order') return showAlert('alertBox', `Table ${t.table_number} already has an order in progress`, 'warning');
  openOrderModal(id, t.table_number);
}

function openOrderModal(tableId, tableNum) {
  selectedTableId = tableId;
  orderItemCount = 0;
  document.getElementById('orderModalTitle').textContent = `Take Order — Table ${tableNum}`;
  document.getElementById('orderItems').innerHTML = '';
  document.getElementById('orderAlert').classList.add('hidden');
  addItem();
  showModal('orderModal');
}

function addItem() {
  const id = ++orderItemCount;
  const div = document.createElement('div');
  div.className = 'order-item-input';
  div.id = 'item-row-' + id;
  div.innerHTML = `
    <input type="text" placeholder="Item name" id="iname-${id}">
    <input type="number" placeholder="Qty" id="iqty-${id}" min="1" value="1">
    <input type="number" placeholder="Price $" id="iprice-${id}" min="0" step="0.01" value="0">
    <button class="remove-item" onclick="removeItem(${id})">×</button>
  `;
  document.getElementById('orderItems').appendChild(div);
}

function removeItem(id) {
  document.getElementById('item-row-'+id)?.remove();
}

async function submitOrder() {
  const items = [];
  for (let i = 1; i <= orderItemCount; i++) {
    const row = document.getElementById('item-row-'+i);
    if (!row) continue;
    const name = document.getElementById('iname-'+i).value.trim();
    if (!name) continue;
    items.push({ name, quantity: parseInt(document.getElementById('iqty-'+i).value)||1, price: parseFloat(document.getElementById('iprice-'+i).value)||0 });
  }
  if (!items.length) return showAlert('orderAlert', 'Add at least one item');
  try {
    await API.createOrder({ table_id: selectedTableId, items });
    hideModal('orderModal');
    showAlert('alertBox', 'Order placed successfully!', 'success');
    loadAll();
  } catch(e) { showAlert('orderAlert', e.message); }
}

async function loadMyOrders() {
  const orders = await API.orders(user.location_id);
  const mine = orders.filter(o => o.waiter_id === user.id);
  document.getElementById('myOrders').innerHTML = mine.length
    ? mine.map(o => `
        <div class="order-card status-${o.status}">
          <div class="order-header">
            <div class="order-table">Table ${o.table_number}</div>
            ${statusBadge(o.status)}
          </div>
          <div class="order-items">
            ${(o.items||[]).map(i => `<div class="order-item-row">${i.item_name} ×${i.quantity} — $${(i.price*i.quantity).toFixed(2)}</div>`).join('')}
          </div>
          <div class="order-time">Placed ${timeAgo(o.created_at)}</div>
          ${o.status === 'ready' ? `<div class="order-actions"><button class="btn btn-success btn-sm" onclick="markServed(${o.id})">Mark Served</button></div>` : ''}
        </div>
      `).join('')
    : '<div style="color:var(--muted);padding:24px;text-align:center">No active orders</div>';
}

async function markServed(id) {
  await API.updateOrder(id, 'served');
  loadMyOrders();
  loadAll();
}

loadAll();
setInterval(loadAll, 5000);
</script>
</body>
</html>
