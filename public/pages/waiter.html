<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waiter Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .order-item-input { display:grid; grid-template-columns:1fr 80px 90px 32px; gap:6px; margin-bottom:6px; align-items:center; }
    .order-item-input input { padding:6px 10px; border:1.5px solid var(--border); border-radius:6px; font-size:13px; }
    .remove-item { background:none; border:none; color:var(--danger); font-size:18px; cursor:pointer; }
    .my-tables-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🍷</div>
      <div class="logo-name">Restaurant Mgmt</div>
      <div class="logo-sub">Waiter Station</div>
    </div>
    <div class="sidebar-user">
      <div class="user-name" id="sb-name"></div>
      <div class="user-role" id="sb-role"></div>
      <div class="user-loc" id="sb-location"></div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="#" onclick="switchView('mine')"><span class="nav-icon">⭐</span>My Area</a>
      <a class="nav-item" href="#" onclick="switchView('floor')"><span class="nav-icon">🗺️</span>Full Floor</a>
      <a class="nav-item" href="#" onclick="switchView('orders')"><span class="nav-icon">🍽️</span>My Orders</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn">Sign Out</button></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <div class="topbar">
      <button class="hamburger-btn" id="hamburgerBtn">☰</button>
      <div class="topbar-title" id="pageTitle">My Area</div>
      <div class="topbar-right">
        <span class="text-muted text-sm" id="topbarTime"></span>
        <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
        <button class="btn btn-ghost btn-sm" onclick="loadAll()">↻ Refresh</button>
      </div>
    </div>

    <div class="page-body">
      <div id="alertBox" class="alert hidden" style="margin-bottom:16px"></div>

      <!-- My Area -->
      <div id="view-mine">
        <div id="myAreaContent">
          <div style="text-align:center;padding:40px;color:var(--muted)">Loading…</div>
        </div>
      </div>

      <!-- Full floor -->
      <div id="view-floor" class="hidden">
        <div id="fullFloorContent"></div>
      </div>

      <!-- My orders -->
      <div id="view-orders" class="hidden">
        <div class="order-queue" id="myOrders"></div>
      </div>
    </div>
  </div>
</div>

<!-- Take Order Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="width:520px">
    <div class="modal-title" id="orderModalTitle">Take Order — Table ?</div>
    <div id="orderAlert" class="alert hidden"></div>
    <div style="margin-bottom:12px">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px">Quick Add from Menu</label>
      <div id="menuPicker" style="max-height:200px;overflow-y:auto;border:1.5px solid var(--border);border-radius:8px;padding:6px"></div>
    </div>
    <div id="orderItems"></div>
    <button class="btn btn-ghost btn-sm" onclick="addItem()" style="margin-top:6px">+ Add Item</button>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn btn-primary" onclick="submitOrder()">Place Order</button>
      <button class="btn btn-ghost" onclick="hideModal('orderModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- Change Table Status Modal -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <div class="modal-title" id="statusModalTitle">Update Table Status</div>
    <div id="statusModalAlert" class="alert hidden"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="statusModalBtns"></div>
    <button class="btn btn-ghost" style="width:100%;margin-top:12px" onclick="hideModal('statusModal')">Cancel</button>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
const user = requireAuth(['waiter','manager']);
if (user) populateSidebar(user);
liveClock('topbarTime');
onModalOverlayClick('orderModal');
onModalOverlayClick('statusModal');

connectWebSocket(user?.location_id, {
  order_update: () => { if (currentView === 'orders') loadOrders(); },
  table_update: d => { if (currentView === 'mine' || currentView === 'floor') loadAll(); },
});

let allTables = [], areaData = [], selectedTableId = null, orderItemCount = 0, statusTableId = null, currentView = 'mine';
function loadOrders() { loadMyOrders(); }

function switchView(v) {
  currentView = v;
  ['mine','floor','orders'].forEach(x => document.getElementById('view-'+x).classList.toggle('hidden', x !== v));
  document.querySelectorAll('.nav-item').forEach((n,i) => n.classList.toggle('active', ['mine','floor','orders'][i] === v));
  document.getElementById('pageTitle').textContent = { mine:'My Area', floor:'Full Floor', orders:'My Orders' }[v];
  if (v === 'mine')   renderMyArea();
  if (v === 'floor')  renderFullFloor();
  if (v === 'orders') loadMyOrders();
}

async function loadAll() {
  [allTables, areaData] = await Promise.all([
    API.tables(user.location_id),
    API.tablesByArea(user.location_id),
  ]);
  renderMyArea();
}

// ── My Area ────────────────────────────────────────────────
function renderMyArea() {
  const myAreas = areaData.filter(a => a.waiters && a.waiters.some(w => w.id === user.id));
  const el = document.getElementById('myAreaContent');

  if (!myAreas.length) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:40px;margin-bottom:12px">📍</div>
      <div style="font-weight:700;color:var(--burgundy);margin-bottom:8px">No area assigned yet</div>
      <div style="color:var(--muted);font-size:13.5px">Ask your manager to assign you to an area. You can still see the Full Floor.</div>
    </div>`;
    return;
  }

  el.innerHTML = myAreas.map(area => `
    <div class="area-section">
      <div class="area-header">
        <div class="area-dot" style="background:${area.color}"></div>
        <div class="area-name">${area.name}</div>
        <div class="area-meta">${area.tables.length} tables</div>
      </div>
      <div class="my-tables-grid">
        ${area.tables.map(t => {
          const info = tableStatusInfo(t.status);
          return `<div class="table-card ts-${t.status}" style="background:${info.bg};border-color:${info.border};border-width:2.5px;" onclick="tableClick(${t.id})">
            <div class="table-num" style="color:${info.border}">T${t.table_number}</div>
            <div class="table-cap">${t.capacity} seats</div>
            <div style="font-size:20px;margin:4px 0">${info.emoji}</div>
            <div class="table-stat" style="color:${info.text};font-size:11px">${info.label}</div>
            ${t.status === 'waiting_order' ? '<div style="margin-top:4px"><span class="badge badge-gold" style="font-size:10px">Take Order</span></div>' : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

// ── Full Floor ─────────────────────────────────────────────
function renderFullFloor() {
  document.getElementById('fullFloorContent').innerHTML = areaData.map(area => `
    <div class="area-section">
      <div class="area-header">
        <div class="area-dot" style="background:${area.color || '#999'}"></div>
        <div class="area-name">${area.name}</div>
        <div class="area-meta">${area.tables.length} tables</div>
        ${area.waiters?.length ? `<div class="area-waiter-badge">👤 ${area.waiters.map(w=>w.name).join(', ')}</div>` : ''}
      </div>
      <div class="floor-grid">
        ${area.tables.map(t => {
          const info = tableStatusInfo(t.status);
          const isMyTable = area.waiters?.some(w => w.id === user.id);
          return `<div class="table-card ts-${t.status}" style="background:${info.bg};border-color:${info.border};border-width:${isMyTable?'3':'2'}px;${isMyTable?'box-shadow:0 0 0 2px '+info.border+';':''}" onclick="tableClick(${t.id})">
            <div class="table-num" style="color:${info.border}">T${t.table_number}</div>
            <div class="table-cap">${t.capacity} seats</div>
            <div style="font-size:18px;margin:4px 0">${info.emoji}</div>
            <div class="table-stat" style="color:${info.text};font-size:11px">${info.label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

// ── Table click ────────────────────────────────────────────
function tableClick(id) {
  const t = allTables.find(x => x.id === id);
  if (!t) return;

  if (t.status === 'waiting_order') {
    // Offer both options: take order or just change status
    statusTableId = id;
    const info = tableStatusInfo(t.status);
    document.getElementById('statusModalTitle').textContent = `Table ${t.table_number} · ${info.emoji} ${info.label}`;
    document.getElementById('statusModalBtns').innerHTML =
      `<button class="btn btn-primary" style="grid-column:1/-1;justify-content:center" onclick="hideModal('statusModal');openOrderModal(${id},${t.table_number})">📋 Take Order</button>` +
      TABLE_STATUSES.map(s => `
        <button class="btn ${s.value===t.status?'btn-primary':'btn-ghost'}" style="justify-content:center;gap:6px" onclick="changeTableStatus('${s.value}')">
          ${s.emoji} ${s.label}
        </button>`).join('');
    showModal('statusModal');
    return;
  }

  openStatusModal(id);
}

function openStatusModal(tableId) {
  statusTableId = tableId;
  const t = allTables.find(x => x.id === tableId);
  const info = tableStatusInfo(t.status);
  document.getElementById('statusModalTitle').textContent = `Table ${t.table_number} · ${info.emoji} ${info.label}`;
  document.getElementById('statusModalBtns').innerHTML = TABLE_STATUSES.map(s => `
    <button class="btn ${s.value===t.status?'btn-primary':'btn-ghost'}" style="justify-content:center;gap:6px" onclick="changeTableStatus('${s.value}')">
      ${s.emoji} ${s.label}
    </button>
  `).join('');
  showModal('statusModal');
}

async function changeTableStatus(status) {
  try {
    await API.updateTable(statusTableId, status);
    hideModal('statusModal');
    loadAll();
  } catch(e) { showAlert('statusModalAlert', e.message); }
}

// ── Take Order ─────────────────────────────────────────────
function openOrderModal(tableId, tableNum) {
  selectedTableId = tableId;
  orderItemCount = 0;
  document.getElementById('orderModalTitle').textContent = `Take Order — Table ${tableNum}`;
  document.getElementById('orderItems').innerHTML = '';
  document.getElementById('orderAlert').classList.add('hidden');
  document.getElementById('menuPicker').innerHTML = '<p style="color:var(--muted);font-size:12px;padding:8px;text-align:center">Loading menu…</p>';
  addItem();
  loadMenuPicker();
  showModal('orderModal');
}

function addItem() {
  const id = ++orderItemCount;
  const div = document.createElement('div');
  div.className = 'order-item-input';
  div.id = 'item-row-' + id;
  div.innerHTML = `
    <input type="text" placeholder="Item name" id="iname-${id}">
    <input type="number" placeholder="Qty" id="iqty-${id}" min="1" value="1">
    <input type="number" placeholder="Price $" id="iprice-${id}" min="0" step="0.01" value="0">
    <button class="remove-item" onclick="document.getElementById('item-row-${id}').remove()">×</button>
  `;
  document.getElementById('orderItems').appendChild(div);
}

async function submitOrder() {
  const items = [];
  for (let i = 1; i <= orderItemCount; i++) {
    const row = document.getElementById('item-row-'+i);
    if (!row) continue;
    const name = document.getElementById('iname-'+i).value.trim();
    if (!name) continue;
    items.push({ name, quantity: parseInt(document.getElementById('iqty-'+i).value)||1, price: parseFloat(document.getElementById('iprice-'+i).value)||0 });
  }
  if (!items.length) return showAlert('orderAlert', 'Add at least one item');
  try {
    await API.createOrder({ table_id: selectedTableId, items });
    hideModal('orderModal');
    showAlert('alertBox', 'Order placed!', 'success');
    loadAll();
  } catch(e) { showAlert('orderAlert', e.message); }
}

// ── My Orders ──────────────────────────────────────────────
async function loadMyOrders() {
  const orders = await API.orders(user.location_id);
  const mine = orders.filter(o => o.waiter_id === user.id);
  document.getElementById('myOrders').innerHTML = mine.length
    ? mine.map(o => `
        <div class="order-card status-${o.status}">
          <div class="order-header">
            <div class="order-table">Table ${o.table_number}${o.area_name ? ' <span style="font-size:12px;font-weight:400;color:var(--muted)">· '+o.area_name+'</span>' : ''}</div>
            ${statusBadge(o.status)}
          </div>
          <div class="order-items">
            ${(o.items||[]).map(i => `<div class="order-item-row">${i.item_name} ×${i.quantity} — $${(i.price*i.quantity).toFixed(2)}</div>`).join('')}
          </div>
          <div class="order-time">Placed ${timeAgo(o.created_at)}</div>
          ${o.status === 'ready' ? `<div class="order-actions"><button class="btn btn-success btn-sm" onclick="markServed(${o.id})">Mark Served</button></div>` : ''}
        </div>
      `).join('')
    : '<div style="color:var(--muted);padding:24px;text-align:center">No active orders</div>';
}

async function markServed(id) {
  await API.updateOrder(id, 'served');
  loadMyOrders();
  loadAll();
}

loadAll();
setInterval(loadAll, 5000);
</script>
</body>
</html>
