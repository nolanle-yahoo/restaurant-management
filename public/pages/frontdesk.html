<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Front Desk</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .legend { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--muted); }
    .legend-dot { width:14px; height:14px; border-radius:50%; border:2px solid; flex-shrink:0; }
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .filter-btn { padding:5px 13px; border-radius:20px; border:1.5px solid var(--border); background:#fff; cursor:pointer; font-size:12px; font-weight:600; transition:all .15s; }
    .filter-btn.active { background:var(--burgundy); color:#fff; border-color:var(--burgundy); }
    .assign-select { padding:5px 10px; border:1.5px solid var(--border); border-radius:8px; font-size:12px; background:#fff; }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🍷</div>
      <div class="logo-name">Restaurant Mgmt</div>
      <div class="logo-sub">Front Desk</div>
    </div>
    <div class="sidebar-user">
      <div class="user-name" id="sb-name"></div>
      <div class="user-role" id="sb-role"></div>
      <div class="user-loc" id="sb-location"></div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="#" onclick="switchView('map')"><span class="nav-icon">🗺️</span>Floor Map</a>
      <a class="nav-item" href="#" onclick="switchView('areas')"><span class="nav-icon">📍</span>Areas & Staff</a>
      <a class="nav-item" href="#" onclick="switchView('reservations')"><span class="nav-icon">📅</span>Reservations</a>
      <a class="nav-item" href="#" onclick="switchView('waitlist')"><span class="nav-icon">⏳</span>Waitlist</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn">Sign Out</button></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <div class="topbar">
      <button class="hamburger-btn" id="hamburgerBtn">☰</button>
      <div class="topbar-title" id="pageTitle">Floor Map</div>
      <div class="topbar-right">
        <span class="text-muted text-sm" id="lastRefresh"></span>
        <span class="text-muted text-sm" id="topbarTime"></span>
        <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
        <button class="btn btn-ghost btn-sm" onclick="loadAll()">↻ Refresh</button>
      </div>
    </div>

    <div class="page-body">

      <!-- Floor map view -->
      <div id="view-map">
        <div class="legend" id="statusLegend"></div>
        <div class="filter-bar">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('empty',this)">Empty</button>
          <button class="filter-btn" onclick="setFilter('occupied',this)">Occupied</button>
          <button class="filter-btn" onclick="setFilter('waiting_order',this)">Ready to Order</button>
          <button class="filter-btn" onclick="setFilter('waiting_food',this)">Waiting Food</button>
          <button class="filter-btn" onclick="setFilter('need_help',this)">Needs Help</button>
          <button class="filter-btn" onclick="setFilter('waiting_payment',this)">Waiting to Pay</button>
          <button class="filter-btn" onclick="setFilter('ready_clean',this)">Ready to Clean</button>
        </div>
        <div id="floorContent"></div>
      </div>

      <!-- Areas & Staff view -->
      <div id="view-areas" class="hidden">
        <div class="assign-grid" id="areaAssignGrid"></div>
      </div>

      <!-- Reservations view -->
      <div id="sec-reservations" class="hidden">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Today's Reservations</div>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="date" id="fdResDate" onchange="loadFdReservations()" style="padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px">
              <button class="btn btn-primary btn-sm" onclick="openFdResModal()">+ New Reservation</button>
            </div>
          </div>
          <div id="fdResAlert" class="alert hidden" style="margin-bottom:12px"></div>
          <div id="fdResList"></div>
        </div>
      </div>

      <div id="sec-waitlist" class="hidden">
        <div class="card" style="margin-bottom:16px">
          <div class="card-header"><div class="card-title">Add to Waitlist</div></div>
          <div id="wlAlert" class="alert hidden" style="margin-bottom:10px"></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
            <input id="wlName" placeholder="Guest name *" style="padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px">
            <input id="wlParty" type="number" min="1" value="2" style="width:80px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px" title="Party size">
            <input id="wlPhone" placeholder="Phone" style="padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px">
            <input id="wlQuote" type="number" min="0" placeholder="Quote (min)" style="width:110px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px">
            <button class="btn btn-primary btn-sm" onclick="addToWaitlist()">+ Add Party</button>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Waiting (<span id="wlCount">0</span>)</div></div>
          <div id="wlList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Reservation modal -->
<div class="modal-overlay" id="fdResModal">
  <div class="modal">
    <div class="modal-title">New Reservation</div>
    <div id="fdResModalAlert" class="alert hidden"></div>
    <div class="form-row">
      <div class="form-group"><label>Guest Name *</label><input id="fdResName" placeholder="Full name"></div>
      <div class="form-group"><label>Phone</label><input id="fdResPhone" placeholder="(555) 000-0000"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Party Size *</label><input type="number" id="fdResParty" value="2" min="1"></div>
      <div class="form-group"><label>Time *</label><input type="time" id="fdResTime" value="19:00"></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="fdResNotes" rows="2" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;resize:vertical"></textarea></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-primary" onclick="submitFdRes()">Save</button>
      <button class="btn btn-ghost" onclick="hideModal('fdResModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- Table status modal -->
<div class="modal-overlay" id="tableModal">
  <div class="modal">
    <div class="modal-title" id="modalTableTitle">Table 1</div>
    <div id="tableAlert" class="alert hidden"></div>
    <p style="margin-bottom:14px;color:var(--muted);font-size:13px">Update this table's status:</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="statusButtons"></div>
    <button class="btn btn-ghost" style="width:100%;margin-top:14px" onclick="hideModal('tableModal')">Cancel</button>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
const user = requireAuth(['frontdesk','manager','owner']);
if (user) populateSidebar(user);
liveClock('topbarTime');
onModalOverlayClick('tableModal');

let allTables = [], areaData = [], filterStatus = 'all', selectedTable = null, currentView = 'map';

// Build legend
document.getElementById('statusLegend').innerHTML = TABLE_STATUSES.map(s =>
  `<div class="legend-item"><div class="legend-dot" style="background:${s.bg};border-color:${s.border}"></div>${s.label}</div>`
).join('');

function switchView(v) {
  document.getElementById('view-map').classList.toggle('hidden', v !== 'map');
  document.getElementById('view-areas').classList.toggle('hidden', v !== 'areas');
  document.getElementById('sec-reservations').classList.toggle('hidden', v !== 'reservations');
  document.getElementById('sec-waitlist').classList.toggle('hidden', v !== 'waitlist');
  document.querySelectorAll('.nav-item').forEach((n,i) => n.classList.toggle('active', ['map','areas','reservations','waitlist'][i] === v));
  document.getElementById('pageTitle').textContent = { map:'Floor Map', areas:'Areas & Staff', reservations:'Reservations', waitlist:'Waitlist' }[v] || 'Floor Map';
  currentView = v;
  if (v === 'areas') loadAreas();
  if (v === 'reservations') loadFdReservations();
  if (v === 'waitlist') loadWaitlist();
}

// ── Waitlist ──────────────────────────────────────────────────
async function loadWaitlist() {
  let rows = []; try { rows = await API.waitlist(user.location_id); } catch(e) { return; }
  document.getElementById('wlCount').textContent = rows.length;
  const el = document.getElementById('wlList');
  el.innerHTML = rows.length ? rows.map((w, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div><span style="font-weight:800;color:var(--burgundy)">#${i+1}</span> <b>${w.guest_name}</b> · ${w.party_size} 👤
        <div style="font-size:12px;color:var(--muted)">waiting ${timeAgo(w.created_at)}${w.quoted_minutes?` · quoted ${w.quoted_minutes}m`:''}${w.phone?` · ${w.phone}`:''}</div></div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-success" onclick="waitlistSet(${w.id},'seated')">Seat</button>
        <button class="btn btn-sm btn-ghost" onclick="waitlistSet(${w.id},'left')">Remove</button>
      </div>
    </div>`).join('') : '<p style="color:var(--muted);padding:16px;text-align:center">No parties waiting.</p>';
}
async function addToWaitlist() {
  const guest_name = document.getElementById('wlName').value.trim();
  if (!guest_name) return showAlert('wlAlert', 'Guest name required');
  try {
    await API.waitlistAdd({ guest_name, party_size: document.getElementById('wlParty').value, phone: document.getElementById('wlPhone').value.trim(), quoted_minutes: document.getElementById('wlQuote').value });
    ['wlName','wlPhone','wlQuote'].forEach(id => document.getElementById(id).value = ''); document.getElementById('wlParty').value = 2;
    loadWaitlist();
  } catch(e) { showAlert('wlAlert', e.message); }
}
async function waitlistSet(id, status) { try { await API.waitlistUpdate(id, status); loadWaitlist(); } catch(e) { alert(e.message); } }

function setFilter(status, btn) {
  filterStatus = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFloor();
}

function renderFloor() {
  const filtered = filterStatus === 'all' ? allTables : allTables.filter(t => t.status === filterStatus);

  if (filterStatus !== 'all') {
    // Flat grid when filtered
    document.getElementById('floorContent').innerHTML = `
      <div class="floor-grid">
        ${filtered.map(t => renderTableCard(t)).join('') || '<div style="color:var(--muted);grid-column:1/-1;text-align:center;padding:24px">No tables match filter</div>'}
      </div>`;
    return;
  }

  // Group by area
  document.getElementById('floorContent').innerHTML = areaData.map(area => {
    const areaTables = area.tables;
    if (!areaTables.length) return '';
    return `<div class="area-section">
      <div class="area-header">
        <div class="area-dot" style="background:${area.color || '#999'}"></div>
        <div class="area-name">${area.name}</div>
        <div class="area-meta">${areaTables.length} tables</div>
        ${area.waiters?.length ? `<div class="area-waiter-badge">👤 ${area.waiters.map(w=>w.name).join(', ')}</div>` : ''}
      </div>
      <div class="floor-grid">${areaTables.map(t => renderTableCard(t)).join('')}</div>
    </div>`;
  }).join('');
}

function renderTableCard(t) {
  const info = tableStatusInfo(t.status);
  return `<div class="table-card ts-${t.status}" style="background:${info.bg};border-color:${info.border};" onclick="openTableModal(${t.id})">
    <div class="table-num" style="color:${info.border}">T${t.table_number}</div>
    <div class="table-cap" style="color:var(--muted)">${t.capacity} seats</div>
    <div style="font-size:18px;margin:4px 0">${info.emoji}</div>
    <div class="table-stat" style="color:${info.text}">${info.label}</div>
    ${t.waiter_name ? `<div style="font-size:10px;color:var(--muted);margin-top:3px">${t.waiter_name.split(' ')[0]}</div>` : ''}
  </div>`;
}

async function loadAll() {
  [allTables, areaData] = await Promise.all([
    API.tables(user.location_id),
    API.tablesByArea(user.location_id),
  ]);
  renderFloor();
  document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + ' · ';
}

async function loadAreas() {
  const [areas, assignments] = await Promise.all([
    API.areas(user.location_id),
    API.areaAssignments(user.location_id),
  ]);
  document.getElementById('areaAssignGrid').innerHTML = areas.map(a => `
    <div class="assign-card">
      <div class="area-title">
        <div class="area-dot" style="background:${a.color};width:10px;height:10px;border-radius:50%;flex-shrink:0"></div>
        ${a.name}
        <span style="font-size:12px;color:var(--muted);font-weight:400">${a.table_count} tables</span>
      </div>
      <div id="chips-${a.id}">
        ${(a.waiters||[]).length ? a.waiters.map(w => {
          const asgn = assignments.find(x => x.area_id === a.id && x.user_id === w.id);
          return `<div class="assign-chip">👤 ${w.name}<button class="remove-chip" onclick="removeAssignment(${asgn?.id})">×</button></div>`;
        }).join('') : '<span style="font-size:12px;color:var(--muted)">No waiter assigned</span>'}
      </div>
    </div>
  `).join('');
}

function openTableModal(id) {
  selectedTable = allTables.find(t => t.id === id);
  const info = tableStatusInfo(selectedTable.status);
  document.getElementById('modalTableTitle').textContent = `Table ${selectedTable.table_number} · ${selectedTable.area_name || ''} — ${info.emoji} ${info.label}`;
  document.getElementById('statusButtons').innerHTML = TABLE_STATUSES.map(s => `
    <button class="btn ${s.value===selectedTable.status?'btn-primary':'btn-ghost'}" style="justify-content:center;gap:6px" onclick="changeStatus('${s.value}')">
      ${s.emoji} ${s.label}
    </button>
  `).join('');
  showModal('tableModal');
}

async function changeStatus(status) {
  try {
    await API.updateTable(selectedTable.id, status);
    hideModal('tableModal');
    loadAll();
  } catch(e) { showAlert('tableAlert', e.message); }
}

async function removeAssignment(id) {
  if (!id) return;
  await API.removeAssignment(id);
  loadAreas();
}

loadAll();
setInterval(loadAll, 5000);

// WebSocket for live table updates
connectWebSocket(user?.location_id, {
  table_update: () => loadAll(),
  reservation_update: () => { if (document.getElementById('sec-reservations')?.classList.contains('hidden') === false) loadFdReservations(); },
});

// Reservations
let fdResData = [];
async function loadFdReservations() {
  const dateEl = document.getElementById('fdResDate');
  if (!dateEl.value) dateEl.valueAsDate = new Date();
  fdResData = await API.reservations({ location_id: user.location_id, date: dateEl.value });
  renderFdRes();
}
function renderFdRes() {
  if (!fdResData.length) { document.getElementById('fdResList').innerHTML = '<p style="text-align:center;padding:32px;color:var(--muted)">No reservations for this date.</p>'; return; }
  document.getElementById('fdResList').innerHTML = `<table class="data-table">
    <thead><tr><th>Time</th><th>Guest</th><th>Party</th><th>Status</th><th>Notes</th><th>Actions</th></tr></thead>
    <tbody>${fdResData.sort((a,b)=>a.reservation_time.localeCompare(b.reservation_time)).map(r=>`<tr>
      <td class="fw-700">${r.reservation_time}</td>
      <td class="fw-700">${r.guest_name}<br><span class="text-sm text-muted">${r.guest_phone||''}</span></td>
      <td style="text-align:center">${r.party_size} 👤</td>
      <td>${statusBadge(r.status)}</td>
      <td style="max-width:150px;color:var(--muted)">${r.notes||'—'}</td>
      <td style="white-space:nowrap">
        ${r.status==='confirmed'?`<button class="btn btn-sm btn-gold" onclick="updateFdRes(${r.id},'seated')">Seat</button> `:''}
        ${r.status==='seated'?`<button class="btn btn-sm btn-success" onclick="updateFdRes(${r.id},'completed')">Done</button> `:''}
        ${r.status==='pending'?`<button class="btn btn-sm btn-primary" onclick="updateFdRes(${r.id},'confirmed')">Confirm</button> `:''}
        ${!['completed','cancelled'].includes(r.status)?`<button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick="updateFdRes(${r.id},'no_show')">No Show</button>`:''}
      </td>
    </tr>`).join('')}</tbody></table>`;
}
function openFdResModal() {
  document.getElementById('fdResModalAlert').classList.add('hidden');
  ['fdResName','fdResPhone','fdResNotes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fdResParty').value=2;
  document.getElementById('fdResTime').value='19:00';
  showModal('fdResModal');
}
async function submitFdRes() {
  const data = {
    guest_name: document.getElementById('fdResName').value.trim(),
    guest_phone: document.getElementById('fdResPhone').value.trim(),
    party_size: parseInt(document.getElementById('fdResParty').value),
    reservation_date: document.getElementById('fdResDate').value,
    reservation_time: document.getElementById('fdResTime').value,
    notes: document.getElementById('fdResNotes').value.trim(),
    location_id: user.location_id,
  };
  if (!data.guest_name||!data.reservation_time) return showAlert('fdResModalAlert','Name and time required');
  try { await API.reservationCreate(data); hideModal('fdResModal'); showAlert('fdResAlert','Reservation added!','success'); loadFdReservations(); } catch(e) { showAlert('fdResModalAlert',e.message); }
}
async function updateFdRes(id, status) { await API.reservationUpdate(id,{status}); loadFdReservations(); }
onModalOverlayClick('fdResModal');
</script>
</body>
</html>
